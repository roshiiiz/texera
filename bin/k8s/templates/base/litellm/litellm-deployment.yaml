{{- if .Values.litellm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Values.litellm.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-{{ .Values.litellm.name }}
spec:
  replicas: {{ .Values.litellm.numOfPods | default 1 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Values.litellm.name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-{{ .Values.litellm.name }}
    spec:
      containers:
        - name: {{ .Values.litellm.name }}
          image: {{ .Values.litellm.image }}
          imagePullPolicy: Always
          args:
            - "--config"
            - "/app/config/litellm-config.yaml"
          ports:
            - containerPort: {{ .Values.litellm.service.port }}
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-agent-service-secret
                  key: litellm-master-key
            # Postgres persistence: LiteLLM runs its Prisma migrations against this
            # database on startup and stores keys, spend, and (with STORE_MODEL_IN_DB)
            # model config there, so state survives pod restarts. Defaults to the
            # in-cluster Postgres; set litellm.databaseUrl to point at an external one.
            - name: DATABASE_URL
              value: {{ .Values.litellm.databaseUrl | default (printf "postgresql://postgres:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.postgresPassword .Release.Name .Values.litellm.databaseName) | quote }}
            - name: STORE_MODEL_IN_DB
              value: "{{ .Values.litellm.storeModelInDb }}"
            {{- range $key, $value := .Values.litellm.providerApiKeys }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Release.Name }}-agent-service-secret
                  key: {{ $key }}
            {{- end }}
          volumeMounts:
            - name: litellm-config
              mountPath: /app/config
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: {{ .Values.litellm.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/liveliness
              port: {{ .Values.litellm.service.port }}
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: litellm-config
          configMap:
            name: {{ .Release.Name }}-litellm-config
{{- end }}
