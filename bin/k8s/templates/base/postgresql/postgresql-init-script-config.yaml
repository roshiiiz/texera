apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.postgresql.primary.initdb.scriptsConfigMap }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}
data:
  init.sh: |
    #!/bin/bash
    echo "Running Texera schema initialization..."
    export PGPASSWORD=$POSTGRES_PASSWORD

    # Execute SQL files in order
    echo "Initializing LakeFS database..."
    cat <<'EOF' > /tmp/texera_lakefs.sql
{{ .Files.Get "files/texera_lakefs.sql" | indent 6 }}
    EOF
    psql -U postgres -f /tmp/texera_lakefs.sql

    echo "Initializing Iceberg catalog database..."
    cat <<'EOF' > /tmp/iceberg_postgres_catalog.sql
{{ .Files.Get "files/iceberg_postgres_catalog.sql" | indent 6 }}
    EOF
    psql -U postgres -f /tmp/iceberg_postgres_catalog.sql

    echo "Initializing Lakekeeper database..."
    cat <<'EOF' > /tmp/texera_lakekeeper.sql
{{ .Files.Get "files/texera_lakekeeper.sql" | indent 6 }}
    EOF
    psql -U postgres -f /tmp/texera_lakekeeper.sql

    echo "Initializing Texera database..."
    cat <<'EOF' > /tmp/texera_ddl.sql
{{ .Files.Get "files/texera_ddl.sql" | indent 6 }}
    EOF
    psql -U postgres -f /tmp/texera_ddl.sql
{{- if .Values.litellm.enabled }}

    echo "Initializing LiteLLM database..."
    # LiteLLM (Prisma) creates its own tables on startup but the database must exist.
    psql -U postgres -tc "SELECT 1 FROM pg_database WHERE datname = '{{ .Values.litellm.databaseName }}'" | grep -q 1 \
      || psql -U postgres -c "CREATE DATABASE {{ .Values.litellm.databaseName }}"
{{- end }}

    echo "Schema initialization complete."