apiVersion: apps/v1
kind: Deployment
metadata:
  name:  {{.Release.Name}}-{{ .Values.accessControlService.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ .Release.Name }}-{{ .Values.accessControlService.name }}
spec:
  replicas: {{ .Values.accessControlService.numOfPods | default 1 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-{{ .Values.accessControlService.name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-{{ .Values.accessControlService.name }}
    spec:
      containers:
        - name: {{ .Values.accessControlService.name }}
          image: {{ .Values.texera.imageRegistry }}/{{ .Values.accessControlService.imageName }}:{{ .Values.texera.imageTag }}
          imagePullPolicy: {{ .Values.texeraImages.pullPolicy }}
          ports:
            - containerPort: {{ .Values.accessControlService.service.port }}
          env:
            - name: STORAGE_JDBC_URL
              value: jdbc:postgresql://{{ .Release.Name }}-postgresql:5432/texera_db?currentSchema=texera_db,public
            - name: STORAGE_JDBC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-postgresql
                  key: postgres-password
            - name: KUBERNETES_COMPUTE_UNIT_POOL_NAME
              value: {{ .Values.workflowComputingUnitPool.name }}
            - name: KUBERNETES_COMPUTE_UNIT_POOL_NAMESPACE
              value: {{ .Values.workflowComputingUnitPool.namespace }}
            {{- if .Values.litellm.enabled }}
            # LLM gateway used to serve /api/chat and /api/models to the agent service.
            - name: LITELLM_BASE_URL
              value: http://{{ .Values.litellm.name }}-svc:{{ .Values.litellm.service.port }}
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-agent-service-secret
                  key: litellm-master-key
            {{- end }}
            {{- range .Values.texeraEnvVars }}
            - name: {{ .name }}
              value: "{{ .value }}"
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/healthcheck
              port: {{ .Values.accessControlService.service.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/healthcheck
              port: {{ .Values.accessControlService.service.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
