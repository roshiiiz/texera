# Overlay for bin/local-dev.sh on top of bin/single-node/docker-compose.yml.
# bin/single-node was designed so the texera microservices run inside the same
# compose network as the infra — postgres/lakefs/lakekeeper/litellm therefore
# don't publish their ports to the host. The local-dev flow runs the JVM and
# Node services *natively* on the host, so we expose each backend port here.

services:
  postgres:
    ports:
      - "5432:5432"

  lakefs:
    ports:
      - "8000:8000"

  lakekeeper:
    ports:
      - "8181:8181"

  litellm:
    ports:
      - "4000:4000"

  # The default .env hardcodes STORAGE_S3_ENDPOINT=http://texera-minio:9000
  # — only routable inside the docker compose network. lakekeeper-init bakes
  # that string into the warehouse's storage profile, which Lakekeeper then
  # both dials itself (for s3 ops) AND returns to clients. The host-native
  # JVMs in local-dev mode can't resolve `texera-minio`.
  #
  # Use whatever STORAGE_S3_ENDPOINT the parent process exported. The
  # wrapper script (bin/local-dev.sh) detects the host's LAN IP at startup
  # and exports e.g. http://192.168.1.x:9000 — reachable from both sides:
  #   • lakekeeper container: out via docker bridge → host's published :9000
  #   • host JVM:             straight to host's published :9000
  # If the env wasn't exported (script not used), fall back to localhost
  # which at least keeps the warehouse creation from blowing up.
  lakekeeper-init:
    environment:
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-http://localhost:9000}
