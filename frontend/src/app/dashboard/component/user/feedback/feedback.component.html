<div class="feedback-container">
  <!-- Submit box: only when the user is viewing their own feedback -->
  <nz-card
    *ngIf="!isAdminView"
    class="feedback-submit-card"
    nzTitle="Send us your feedback">
    <p class="feedback-hint">
      Tell us what you like, what is broken, or what you would like to see next. Your feedback goes straight to the
      Texera admins.
    </p>
    <textarea
      nz-input
      [(ngModel)]="newFeedback"
      [disabled]="submitting"
      placeholder="Type your feedback here..."
      rows="4"
      class="feedback-textarea"></textarea>
    <button
      nz-button
      nzType="primary"
      class="feedback-submit-button"
      [nzLoading]="submitting"
      [disabled]="newFeedback.trim().length === 0"
      (click)="submitFeedback()">
      <span
        nz-icon
        nzType="send"></span>
      Submit Feedback
    </button>
  </nz-card>

  <!-- Previous feedback table -->
  <nz-card [nzTitle]="isAdminView ? 'User feedback' : 'Your previous feedback'">
    <nz-table
      #feedbackTable
      [nzData]="[...feedbackList]"
      [nzShowPagination]="feedbackList.length > 10"
      [nzPageSize]="10"
      nzSize="small">
      <thead>
        <tr>
          <th nzWidth="220px">Submitted</th>
          <th>Feedback</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let feedback of feedbackTable.data">
          <td>{{ feedback.creationTime | date: "MM/dd/y, h:mm a" }}</td>
          <td class="feedback-message">{{ feedback.message }}</td>
        </tr>
      </tbody>
    </nz-table>
  </nz-card>
</div>
