<br />
<div
  nz-row
  nzGutter="8">
  <nz-select
    nz-col
    nzFlex="auto"
    nzShowSearch
    [nzFilterOption]="datasetFilterOption"
    nzPlaceHolder="Select dataset"
    [(ngModel)]="selectedDataset"
    (ngModelChange)="onDatasetChange()">
    <nz-option
      *ngFor="let dataset of datasets"
      [nzValue]="dataset"
      [nzLabel]="dataset.dataset.name"
      [nzCustomContent]="true">
      <div class="dataset-row">
        <span class="dataset-name"> #{{ dataset.dataset.did }}&nbsp;{{ dataset.dataset.name }} </span>
        <span class="access-level"> {{ dataset.isOwner ? 'OWNER' : dataset.accessPrivilege }} </span>
      </div>
    </nz-option>
  </nz-select>

  <nz-select
    nz-col
    nzFlex="130px"
    nzShowSearch
    nzPlaceHolder="Select version"
    [(ngModel)]="selectedVersion"
    (ngModelChange)="onVersionChange()">
    <nz-option
      *ngFor="let version of datasetVersions"
      [nzValue]="version"
      [nzLabel]="version.name">
    </nz-option>
  </nz-select>
</div>
<br />
<texera-user-dataset-version-filetree
  [isExpandAllAfterViewInit]="true"
  [fileTreeNodes]="fileTree"
  (selectedTreeNode)="onFileSelected($event)">
</texera-user-dataset-version-filetree>
<br />
<button
  nz-button
  nzType="primary"
  [disabled]="!selectedPath"
  (click)="onConfirmSelection()">
  Select
</button>
